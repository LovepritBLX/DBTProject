# models:
#   o2c_dbt_project:
# # -------------------------------------------------------------------------
#     # STAGING LAYER
#     # -------------------------------------------------------------------------
#     # La couche de staging (stg) expose une vue unifiée et normalisée
#     # à partir des données Silver. Les vues sont légères, rapides,
#     # et permettent des changements fréquents sans coût de stockage.
#     #
#     # Règles :
#     # - Tous les modèles dans /models/staging/ sont matérialisés en VIEW
#     # - Pas de logique métier dans cette couche
#     # - Tous les types / noms de colonnes sont standardisés ici
#     # -------------------------------------------------------------------------
#       staging:                      # ← staging folder
#         +schema: stg
#         +materialized: view
  
#     # -------------------------------------------------------------------------
#     # INTERMEDIATE LAYER (INT)
#     # -------------------------------------------------------------------------
#     # Cette couche intermédiaire permet de construire des tables
#     # dérivées du staging, souvent utilisées pour des transformations plus
#     # lourdes, des dénormalisations, ou des pré-agrégations.
#     #
#     # Règles :
#     # - Matérialisation en TABLE (sauf exception)
#     # -------------------------------------------------------------------------
#       intermediate:             # ← staging folder
#         +materialized: view
#         +schema: int

#    # -------------------------------------------------------------------------
#     # MARTS / GOLD LAYER (FCT / DIM)
#     # -------------------------------------------------------------------------
#     # C’est la couche finale consommée par l’analytique :
#     # - dimensions (DimXxx)
#     # - tables de faits (FactXxx)
#     #
#     # On force la matérialisation en TABLE car ces objets sont :
#     # - stables
#     # - requis pour la performance
#     # - utilisés comme sources pour Power BI, Tagetik, etc.
#     #
#     # -------------------------------------------------------------------------
#       mart:             # ← marts folder
#         +schema: gold          # ← surcharge pour un autre
#         +materialized: table


